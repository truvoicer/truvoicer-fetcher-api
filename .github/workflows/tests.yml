name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    # Add MongoDB service
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Configure Composer GitHub token
        run: composer config -g github-oauth.github.com "${{ secrets.TF_CORE_PKGS_PAT_TOKEN }}"

      - name: Prepare Laravel environment (sqlite)
        run: |
          cp .env.example .env
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"

      - name: Set CI env
        run: |
          echo "APP_ENV=testing" >> .env
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env

          # MongoDB configuration
          echo "MONGODB_HOST=127.0.0.1" >> .env
          echo "MONGODB_PORT=27017" >> .env
          echo "MONGODB_DATABASE=fetcher_test" >> .env
          echo "MONGODB_USERNAME=" >> .env
          echo "MONGODB_PASSWORD=" >> .env
          echo "MONGODB_URI=mongodb://127.0.0.1:27017" >> .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Wait for MongoDB to be ready
        run: |
          timeout 30 bash -c 'while ! nc -z localhost 27017; do sleep 1; done'
          echo "MongoDB is ready!"

      - name: Tests
        run: php artisan test
